syntax = "proto3";
package pb;

option go_package = "internal/pb";

import "google/protobuf/timestamp.proto";

message Point {
  string type = 2;
  reserved 4; // was: double value
  google.protobuf.Timestamp time = 5;
  reserved 8; // was: string text
  string key = 11;
  int32 tombstone = 12;
  bytes data = 14;
  string origin = 15;
  int32 dataType = 16;
}

message Points { repeated Point points = 1; }

message SerialPoint {
  string type = 2;
  reserved 4; // was: float value
  int64 time = 16;
  reserved 8; // was: string text
  string key = 11;
  int32 tombstone = 12;
  bytes data = 14;
  string origin = 15;
  int32 dataType = 17;
}

message SerialPoints { repeated SerialPoint points = 1; }

message PointArray {
  uint64 starttime = 1;
  string type = 2;
  string key = 3;
  float samplerate = 4;
  repeated float values = 5;
}
